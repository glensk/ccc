# keyd sample: hold `s`, tap `p`  ->  ccc peek --print   (the s+p chord idea, on Linux)
#
# keyd — https://github.com/rvaiya/keyd — is a system-wide key daemon that can do
# true tap-vs-hold discrimination, so it can reproduce the macOS `s`+`p` chord
# faithfully: tapping `s` still types the letter `s`, only *holding* it turns `s`
# into a layer while you tap `p`.
#
# Requires keyd >= 2.4.0 (the `command()` action). Install this as, e.g.,
#   sudo cp keyd-peek-s-p.conf /etc/keyd/ccc.conf && sudo keyd reload
# See README.md for the caveats (keyd's command() runs from the daemon's context).

[ids]
*

[main]
# Hold `s` -> activate the `ccc_peek` layer; tap `s` -> type `s` as usual.
s = overload(ccc_peek, s)

[ccc_peek]
# In the layer, `p` runs `ccc peek --print`. keyd's command() runs from the keyd
# service context (often root, no DISPLAY), so route the text somewhere visible:
# a desktop notification when notify-send is available, else a scratch file.
p = command(sh -c 'out=$(ccc peek --print 2>&1); if command -v notify-send >/dev/null 2>&1; then notify-send "ccc peek" "$out"; else printf "%s\n" "$out" > "$HOME/.cache/ccc-peek.txt"; fi')
